<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Craft — Audio Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* ── Intro page specific ── */
#page-intro {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.bg-art {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 80% at 50% 40%, #0f1e38, #060c15);
  z-index: 0;
}
.bg-art::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 65% 65% at 50% 50%, transparent 25%, rgba(13,22,37,.9) 100%);
}
.intro-content {
  position: relative; z-index: 4;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
}

/* ── Compass ── */
.compass-wrap {
  position: relative; width: 260px; height: 260px;
  margin-bottom: 2rem;
  opacity: 0; animation: fadeIn 1.5s .1s forwards;
}
.moon-badge {
  position: absolute; top: -10px; right: 18px; font-size: 2rem;
  animation: moonFloat 5s ease-in-out infinite;
}
@keyframes moonFloat {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-10px) rotate(5deg); }
}
.compass-svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 24px rgba(201,168,76,.35));
  animation: rotateSlow 80s linear infinite;
}
@keyframes rotateSlow { to { transform: rotate(360deg); } }

.intro-name {
  font-family: var(--font-title);
  font-size: clamp(2rem,5vw,3.5rem);
  color: var(--cream); line-height: 1.1;
  text-shadow: 0 0 60px rgba(201,168,76,.4);
  margin-bottom: .5rem;
  opacity: 0; animation: fadeIn 1.2s .7s forwards;
}
.intro-role {
  font-family: var(--font-body); font-size: 1.1rem;
  color: var(--gold2); font-style: italic; letter-spacing: .15em;
  margin-bottom: 1.5rem;
  opacity: 0; animation: fadeIn 1.2s 1s forwards;
}
.eyebrow-anim { opacity: 0; animation: fadeIn 1.2s .4s forwards; }
.divider-anim { opacity: 0; animation: fadeIn 1.2s 1.1s forwards; }
.tagline-anim {
  font-size: 1rem; color: var(--muted);
  max-width: 380px; line-height: 1.9; margin-bottom: 2.5rem;
  opacity: 0; animation: fadeIn 1.2s 1.2s forwards;
}
.btn-anim { opacity: 0; animation: fadeIn 1.2s 1.4s forwards; }
</style>
</head>
<body>
<section id="page-intro">
  <div class="bg-art"></div>
  <canvas class="stars-canvas" id="stars-canvas"></canvas>
  <canvas class="stars-canvas" id="stars-canvas2" style="display:none"></canvas>
  <div class="lace-border"></div>

  <div class="star-spark" style="top:14%;left:11%;font-size:1rem;animation-delay:0s">✦</div>
  <div class="star-spark" style="top:20%;right:14%;font-size:.7rem;animation-delay:1s">✧</div>
  <div class="star-spark" style="bottom:24%;left:8%;font-size:.8rem;animation-delay:2s">✦</div>
  <div class="star-spark" style="bottom:18%;right:10%;font-size:1rem;animation-delay:.5s">✧</div>
  <div class="star-spark" style="top:42%;left:5%;font-size:.5rem;animation-delay:1.5s">✦</div>
  <div class="star-spark" style="top:38%;right:6%;font-size:.6rem;animation-delay:2.5s">✦</div>

  <div class="intro-content">
    <div class="compass-wrap">
      <div class="moon-badge">🌙</div>
      <svg class="compass-svg" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
        <circle cx="140" cy="140" r="135" fill="none" stroke="rgba(201,168,76,.45)" stroke-width="1"/>
        <circle cx="140" cy="140" r="126" fill="none" stroke="rgba(201,168,76,.12)" stroke-width=".5"/>
        <g stroke="rgba(201,168,76,.6)" stroke-width="1">
          <line x1="140" y1="5"   x2="140" y2="20"/>
          <line x1="140" y1="260" x2="140" y2="275"/>
          <line x1="5"   y1="140" x2="20"  y2="140"/>
          <line x1="260" y1="140" x2="275" y2="140"/>
        </g>
        <g stroke="rgba(201,168,76,.25)" stroke-width=".5">
          <line x1="203" y1="13"  x2="197" y2="25"/>
          <line x1="267" y1="77"  x2="255" y2="83"/>
          <line x1="267" y1="203" x2="255" y2="197"/>
          <line x1="203" y1="267" x2="197" y2="255"/>
          <line x1="77"  y1="267" x2="83"  y2="255"/>
          <line x1="13"  y1="203" x2="25"  y2="197"/>
          <line x1="13"  y1="77"  x2="25"  y2="83"/>
          <line x1="77"  y1="13"  x2="83"  y2="25"/>
        </g>
        <circle cx="140" cy="140" r="108" fill="rgba(13,22,37,.7)" stroke="rgba(201,168,76,.3)" stroke-width=".5"/>
        <g font-size="11" font-family="serif" fill="rgba(201,168,76,.75)" text-anchor="middle">
          <text x="140" y="38">♈</text><text x="196" y="57">♉</text><text x="232" y="105">♊</text>
          <text x="241" y="145">♋</text><text x="231" y="186">♌</text><text x="196" y="228">♍</text>
          <text x="140" y="249">♎</text><text x="86"  y="228">♏</text><text x="51"  y="186">♐</text>
          <text x="42"  y="145">♑</text><text x="51"  y="105">♒</text><text x="86"  y="57">♓</text>
        </g>
        <g stroke="rgba(201,168,76,.1)" stroke-width=".5">
          <line x1="140" y1="32"  x2="140" y2="248"/>
          <line x1="32"  y1="140" x2="248" y2="140"/>
          <line x1="58"  y1="58"  x2="222" y2="222"/>
          <line x1="222" y1="58"  x2="58"  y2="222"/>
        </g>
        <circle cx="140" cy="140" r="76" fill="rgba(8,14,28,.9)" stroke="rgba(201,168,76,.25)" stroke-width=".5"/>
        <!-- stars inside -->
        <circle cx="140" cy="100" r="1.5" fill="#e8d08a" opacity=".9"/>
        <circle cx="162" cy="118" r="1"   fill="#e8d08a" opacity=".6"/>
        <circle cx="120" cy="122" r="1.2" fill="#e8d08a" opacity=".7"/>
        <circle cx="152" cy="138" r="1"   fill="#e8d08a" opacity=".5"/>
        <circle cx="126" cy="150" r="1"   fill="#e8d08a" opacity=".6"/>
        <circle cx="155" cy="162" r="1.2" fill="#e8d08a" opacity=".4"/>
        <circle cx="132" cy="170" r="1"   fill="#e8d08a" opacity=".7"/>
        <circle cx="148" cy="108" r=".8"  fill="#e8d08a" opacity=".5"/>
        <!-- needle -->
        <g transform="translate(140,140)">
          <polygon points="0,-52 5,-18 0,-22 -5,-18" fill="#c9a84c" opacity=".95"/>
          <polygon points="0,52 5,18 0,22 -5,18"     fill="rgba(201,168,76,.4)"/>
          <polygon points="52,0 18,5 22,0 18,-5"     fill="rgba(201,168,76,.4)"/>
          <polygon points="-52,0 -18,5 -22,0 -18,-5" fill="rgba(201,168,76,.4)"/>
          <circle r="7"   fill="#c9a84c" opacity=".95"/>
          <circle r="3.5" fill="#0d1625"/>
          <circle r="1.8" fill="#e8d08a"/>
        </g>
        <g font-family="serif" font-size="8" fill="rgba(201,168,76,.85)" text-anchor="middle">
          <text x="140" y="78">N</text>
          <text x="206" y="145">E</text>
          <text x="140" y="212">S</text>
          <text x="76"  y="145">W</text>
        </g>
        <g id="ticks" stroke="rgba(201,168,76,.2)" stroke-width=".5"></g>
      </svg>
    </div>

    <p class="eyebrow eyebrow-anim">Audio Engineer &amp; Sound Designer</p>
    <h1 class="intro-name">Sound Craft</h1>
    <p class="intro-role">Where Silence Meets Intention</p>
    <div class="divider divider-anim">✦ ✦ ✦</div>
    <p class="tagline-anim">
      From foley whispers to remixed worlds — crafting audio that moves<br>
      through the soul like starlight through night skies.
    </p>
    <a href="works.html" class="btn-gold btn-anim">
      Explore My Works &nbsp; ↓
    </a>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
