<!DOCTYPE html>
<html lang="en">
<head>

<title>Sound Craft — Heritage Collage</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .project-video-wrap {
    width: 100%;
    margin: 2rem 0 2.5rem;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
    background: #000;
    position: relative;
  }
  .project-video {
    display: block;
    width: 100%;
    height: auto;
    max-height: 70vh;
    object-fit: contain;
  }
</style>
</head>
<body>
<section class="project-page">
  <canvas class="stars-canvas" id="stars-canvas" style="position:absolute;inset:0;z-index:0;pointer-events:none"></canvas>
  <canvas class="stars-canvas" id="stars-canvas2" style="display:none"></canvas>

  <div class="star-spark" style="top:10%;left:8%;font-size:1rem;animation-delay:0s">✦</div>
  <div class="star-spark" style="top:15%;right:10%;font-size:.7rem;animation-delay:1.2s">✧</div>
  <div class="star-spark" style="bottom:20%;left:6%;font-size:.8rem;animation-delay:2s">✦</div>

  <div class="project-header">
    <a href="works.html" class="eyebrow" style="text-decoration:none;display:inline-block;margin-bottom:1.5rem;opacity:.7">
      ← Portfolio
    </a>
    <span class="project-icon">🎼</span>
    <div class="project-num">01 — Cultural Project</div>
    <h1 class="project-title">Heritage Collage</h1>
    <div class="project-type">Cultural Project · Archive Audio · Medley</div>
    <div class="waveform"></div>
  </div>

  <div class="project-body">
      <div class="project-video-wrap">
      <video
        class="project-video"
        src="src/Paraoan_Medley_vid.mp4"
        controls
        preload="metadata"
        playsinline
      >
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <div class="project-nav">
    <a href="works.html" class="btn-ghost">All Works</a>
    
    <a href="dubbing.html" class="btn-ghost">Dubbing → →</a>
  </div>

  <footer>© 2026 Sound Craft · All Rights Reserved</footer>
